name: Spam Classification Inference

on:
  workflow_dispatch:
    inputs:
      input_text:
        description: "Message to classify as Ham or Spam"
        required: true
        default: "URGENT! You have won a 1-week cruise! Call 090xxx to claim now!"

jobs:
  inference:
    name: Run Model Inference
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    env:
      HF_MODEL: nagaananth/MLOPS_group-v2

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Validate Hugging Face Token
        run: |
          if [ -z "${{ secrets.HF_TOKEN_gr }}" ]; then
            echo "❌ HF_TOKEN_gr secret is missing"
            exit 1
          fi
          echo "✅ Hugging Face token detected"

      - name: Set Up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ghcr.io/${{ github.repository }}/inference:latest
          build-args: |
            HF_MODEL_NAME=nagaananth/MLOPS_group-v2
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Run Inference Container
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN_gr }}
          INPUT_TEXT: ${{ github.event.inputs.input_text }}
        run: |
          docker run --rm \
            -e HF_TOKEN="$HF_TOKEN" \
            -e HF_MODEL="$HF_MODEL" \
            -e INPUT_TEXT="$INPUT_TEXT" \
            ghcr.io/${{ github.repository }}/inference:latest
